services:
  # ── STT (Speech-to-Text) — GPU only ────────────────────────────────
  whisper-gpu:
    container_name: foreign-whispers-stt
    profiles: [nvidia]
    image: ghcr.io/speaches-ai/speaches:latest-cuda-12.6.3
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - whisper-cache:/home/ubuntu/.cache/huggingface/hub
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-medium
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://0.0.0.0:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── TTS (Text-to-Speech) — Chatterbox on GPU ──────────────────────
  chatterbox-gpu:
    container_name: foreign-whispers-tts
    profiles: [nvidia]
    image: travisvn/chatterbox-tts-api:latest
    restart: unless-stopped
    shm_size: "8gb"
    ports:
      - "8020:8020"
    environment:
      - DEVICE=cuda
      - DEFAULT_MODEL=multilingual
      - PORT=8020
    volumes:
      - chatterbox-models:/app/models
      - ./pipeline_data/speakers:/app/voices
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── API (CPU orchestrator) — all profiles ─────────────────────────
  # The API container is CPU-only. It delegates GPU work to the STT
  # and TTS containers above via HTTP.
  #
  # Published ports (not host network): Docker Desktop for Mac does not map
  # host networking to macOS localhost; use 8080:8080 so curl http://localhost:8080 works.
  #
  # GPU URLs: set in .env — e.g. nvidia profile on bridge:
  #   FW_WHISPER_BACKEND=remote
  #   FW_WHISPER_API_URL=http://whisper-gpu:8000
  #   CHATTERBOX_API_URL=http://chatterbox-gpu:8020
  # Remote GPU via SSH tunnel from Mac:
  #   FW_WHISPER_API_URL=http://host.docker.internal:18000
  #   CHATTERBOX_API_URL=http://host.docker.internal:18020
  #
  # linux/arm64 (e.g. Docker Desktop on Apple Silicon): PyTorch extras such as
  # triton only ship x86_64 wheels — force amd64 so ``uv sync --frozen`` matches the lockfile.
  api:
    container_name: foreign-whispers-api
    profiles: [nvidia, cpu]
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    restart: unless-stopped
    ports:
      - "8080:8080"
    # --frozen: do not re-resolve deps on start (avoids torchaudio upgrades vs pyannote 3.x).
    command: ["uv", "run", "--frozen", "uvicorn", "api.src.main:app", "--host", "0.0.0.0", "--port", "8080"]
    env_file:
      - .env
    environment:
      - FW_WHISPER_MODEL=${FW_WHISPER_MODEL:-base}
    volumes:
      - ./pipeline_data:/app/pipeline_data
      - ./foreign_whispers:/app/foreign_whispers
      - ./api:/app/api
      - ./cookies.txt:/app/cookies.txt

  # ── Frontend (Next.js) — all profiles ──────────────────────────────
  # API_URL must reach the api service from inside this container (SSR + rewrites).
  # The browser still uses http://localhost:8501; published 8501:8501 maps to the host.
  frontend:
    container_name: foreign-whispers-frontend
    profiles: [nvidia, cpu]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8080
      - HOSTNAME=0.0.0.0
      - PORT=8501
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8501"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  whisper-cache:
  chatterbox-models:
